                  "workflow": "전체_시스템_점검.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {
                      "라이브러리로드": "성공",
                      "코스피조회": "성공" if ok else "실패",
                      "코스닥조회": "성공" if ok else "실패",
                      "종목수": f"{len(df)}개" if ok else "—",
                      "응답시간": f"{latency}ms"
                  },
                  "error": None if ok else "데이터 없음"
              }
              print(f"[{'OK' if ok else 'FAIL'}] pykrx: {len(df) if ok else 0}개 {latency}ms")
          except Exception as e:
              result = {
                  "status": "fail", "workflow": "전체_시스템_점검.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {"라이브러리로드": "실패", "코스피조회": "—", "코스닥조회": "—", "응답시간": "—"},
                  "error": str(e)
              }
              print(f"[FAIL] pykrx: {e}")

          with open("_pykrx_result.json", "w") as f:
              json.dump(result, f, ensure_ascii=False)
          EOF


      - name: KIS 실시간·수급 테스트 (realtime / supply, 토큰 공유)
        id: test-kis-data
        run: |
          python - << 'EOF'
          import json, os, sys, time
          from datetime import datetime

          sys.path.insert(0, os.getcwd())
          from data.realtime import KISClient

          WF = "전체_시스템_점검.yml"
          RUN_AT = datetime.now().strftime("%Y-%m-%dT%H:%M:%S")
          ticker = "005930"

          client = KISClient()
          if os.path.exists("_kis_token.txt"):
              with open("_kis_token.txt") as f:
                  token = f.read().strip()
              if token:
                  client._access_token = token
                  client._token_expires_at = time.time() + 86400
                  print("[INFO] 기존 토큰 재사용")
          print("[INFO] KISClient 단일 인스턴스 생성 — 토큰 1회 발급 후 재사용")

          # --- realtime (현재가) ---
          start = time.time()
          try:
              data = client.get_current_price(ticker)
              latency = int((time.time() - start) * 1000)
              ok = data.get("price", 0) > 0
              realtime_result = {
                  "status": "ok" if ok else "fail",
                  "workflow": WF,
                  "run_at": RUN_AT,
                  "data": {
                      "종목": f"{data.get('name') or '삼성전자'}({ticker})",
                      "현재가": f"{data.get('price', 0):,}원",
                      "등락률": f"{data.get('change_rate', 0)}%",
                      "거래량": f"{data.get('volume', 0):,}",
                      "토큰재사용": "성공",
                      "응답시간": f"{latency}ms",
                  },
                  "error": None,
              }
              print(f"[{'OK' if ok else 'FAIL'}] realtime: {data.get('price')} {latency}ms")
          except Exception as e:
              realtime_result = {
                  "status": "fail",
                  "workflow": WF,
                  "run_at": RUN_AT,
                  "data": {
                      "종목": f"삼성전자({ticker})",
                      "현재가": "—",
                      "등락률": "—",
                      "거래량": "—",
                      "토큰재사용": "—",
                      "응답시간": "—",
                  },
                  "error": str(e),
              }
              print(f"[FAIL] realtime: {e}")

          with open("_realtime_result.json", "w", encoding="utf-8") as f:
              json.dump(realtime_result, f, ensure_ascii=False)

          # --- supply (수급 가집계, 동일 client) ---
          start = time.time()
          try:
              data = client.get_net_buy_aggregate()
              latency = int((time.time() - start) * 1000)
              foreign = data.get("foreign_net", 0)
              institution = data.get("institution_net", 0)
              supply_result = {
                  "status": "ok",
                  "workflow": WF,
                  "run_at": RUN_AT,
                  "data": {
                      "외국인순매수조회": "성공",
                      "기관순매수조회": "성공",
                      "외국인순매수": f"{foreign:,}",
                      "기관순매수": f"{institution:,}",
                      "토큰재사용": "성공",
                      "응답시간": f"{latency}ms",
                  },
                  "error": None,
              }
              print(f"[OK] supply: foreign={foreign} institution={institution} {latency}ms")
          except Exception as e:
              supply_result = {
                  "status": "fail",
                  "workflow": WF,
                  "run_at": RUN_AT,
                  "data": {
                      "외국인순매수조회": "실패",
                      "기관순매수조회": "실패",
                      "외국인순매수": "—",
                      "기관순매수": "—",
                      "토큰재사용": "—",
                      "응답시간": "—",
                  },
                  "error": str(e),
              }
              print(f"[FAIL] supply: {e}")

          with open("_supply_result.json", "w", encoding="utf-8") as f:
              json.dump(supply_result, f, ensure_ascii=False)
          EOF

      - name: 트리거 조건 테스트
        id: test-trigger
        run: |
          python - << 'EOF'
