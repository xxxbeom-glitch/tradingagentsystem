          print(f"[{'OK' if ok else 'FAIL'}] check_institution_buy_turn: {r2}")

          r3 = check_foreign_consecutive_buy("005930", [100000, 200000, 150000])
          ok = r3["triggered"] == True
          results.append(r3)
          if not ok: all_ok = False
          print(f"[{'OK' if ok else 'FAIL'}] check_foreign_consecutive_buy: {r3}")

          r4 = check_sector_top3(2)
          ok = r4["triggered"] == True
          results.append(r4)
          if not ok: all_ok = False
          print(f"[{'OK' if ok else 'FAIL'}] check_sector_top3: {r4}")

          r5 = check_52week_high("005930", 98000, 100000)
          ok = r5["triggered"] == True
          results.append(r5)
          if not ok: all_ok = False
          print(f"[{'OK' if ok else 'FAIL'}] check_52week_high: {r5}")

