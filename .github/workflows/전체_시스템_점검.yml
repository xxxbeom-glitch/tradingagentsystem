      - name: 테이블 스키마 테스트 (db-schema)
        id: test-db-schema
        run: |
          python - << 'EOF'
          import json, os, sqlite3, time
          from datetime import datetime

          from init_db import DB_PATH

          expected = [
              "market_data",
              "disclosure_data",
              "trigger_log",
              "ai_decision_log",
              "portfolio",
              "balance",
          ]

          start = time.time()
          try:
              conn = sqlite3.connect(DB_PATH)
              cursor = conn.cursor()
              cursor.execute(
                  "SELECT name FROM sqlite_master WHERE type='table' AND name NOT LIKE 'sqlite_%'"
              )
              tables = {row[0] for row in cursor.fetchall()}
              conn.close()
              latency = int((time.time() - start) * 1000)

              checks = {t: ("성공" if t in tables else "실패") for t in expected}
              ok = all(v == "성공" for v in checks.values())

              data = {f"{t}테이블": checks[t] for t in expected}
              data["응답시간"] = f"{latency}ms"

              result = {
                  "status": "ok" if ok else "fail",
                  "workflow": "전체_시스템_점검.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": data,
                  "error": None if ok else f"누락 테이블: {', '.join(t for t in expected if t not in tables)}",
              }
              print(f"[{'OK' if ok else 'FAIL'}] db-schema: {checks} {latency}ms")
          except Exception as e:
              result = {
                  "status": "fail",
                  "workflow": "전체_시스템_점검.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {f"{t}테이블": "—" for t in expected},
                  "error": str(e),
              }
              print(f"[FAIL] db-schema: {e}")

          with open("_db_schema_result.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False)
          EOF

