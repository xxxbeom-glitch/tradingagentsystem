          print(f"[OK] count_triggers: {count}개 충족")

          result = {
              "status": "ok" if all_ok else "fail",
              "workflow": WF,
              "run_at": RUN_AT,
              "data": {
                  "거래량급증": "성공" if r1["triggered"] else "실패",
                  "기관순매수전환": "성공" if r2["triggered"] else "실패",
                  "외국인연속순매수": "성공" if r3["triggered"] else "실패",
                  "업종상위3위": "성공" if r4["triggered"] else "실패",
                  "52주신고가": "성공" if r5["triggered"] else "실패",
                  "충족조건수": f"{count}개",
                  "AI호출대상": "예" if count >= 2 else "아니오",
              },
              "error": None,
          }

          with open("_trigger_result.json", "w", encoding="utf-8") as f:
              json.dump(result, f, ensure_ascii=False)
          EOF

      - name: 공시 수집 테스트 (disclosure)
        id: test-disclosure
        run: |
          python - << 'EOF'
          import json, os, sys, time
          from datetime import datetime

          sys.path.insert(0, os.getcwd())
          from data.dart import get_disclosures_by_ticker

          ticker = "005930"
          start = time.time()
          try:
              items = get_disclosures_by_ticker(ticker, days=30)
              latency = int((time.time() - start) * 1000)
              ok = isinstance(items, list)
              count = len(items)
              latest = items[0]["title"][:40] if items else "—"
              result = {
                  "status": "ok" if ok else "fail",
                  "workflow": "전체_시스템_점검.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
