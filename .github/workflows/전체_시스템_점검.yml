      - name: results.json 통합 업데이트
        if: always()
        run: |
          python - << 'EOF'
          import json, os
          from datetime import datetime

          try:
              with open("results.json", "r", encoding="utf-8") as f:
                  data = json.load(f)
          except Exception:
              data = {}

          data["updated_at"] = datetime.now().strftime("%Y-%m-%dT%H:%M:%S")

          mapping = {
              "kis": "_kis_result.json",
              "dart": "_dart_result.json",
              "gemini": "_gemini_result.json",
              "deepseek": "_deepseek_result.json",
              "naver": "_naver_result.json",
              "pykrx": "_pykrx_result.json",
              "realtime": "_realtime_result.json",
              "supply": "_supply_result.json",
              "trigger": "_trigger_result.json",
              "disclosure": "_disclosure_result.json",
              "db-connect": "_db_connect_result.json",
              "db-schema": "_db_schema_result.json",
              "db-write": "_db_write_result.json",
          }

          for key, fname in mapping.items():
              if os.path.exists(fname):
                  with open(fname, "r", encoding="utf-8") as f:
                      data[key] = json.load(f)
                  os.remove(fname)

          with open("results.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print("results.json 통합 완료")
          EOF

      - name: results.json 커밋
        if: always()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git clean -fd results.json
          git pull --rebase --autostash origin main
          git add results.json
          git diff --staged --quiet || git commit -m "ci: 전체 시스템 점검 결과 업데이트"
          git push
