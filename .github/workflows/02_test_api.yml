name: 02 API 연결 테스트

on:
  workflow_dispatch:
  workflow_run:
    workflows: ["01 환경변수 체크"]
    types: [ completed ]

jobs:
  test-api:
    runs-on: ubuntu-latest
    if: ${{ github.event_name == 'workflow_dispatch' || github.event.workflow_run.conclusion == 'success' }}

    env:
      DART_API_KEY: ${{ secrets.DART_API_KEY }}
      DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
      DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
      DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
      KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
      KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
      KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
      KRX_ID: ${{ secrets.KRX_ID }}
      KRX_PW: ${{ secrets.KRX_PW }}
      NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
      NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 패키지 설치
        run: pip install -r requirements.txt

      - name: KIS API 토큰 발급 테스트
        id: test-kis
        run: |
          python - << 'EOF'
          import os, json, requests, time
          from datetime import datetime

          app_key = os.environ["KIS_APP_KEY"]
          app_secret = os.environ["KIS_APP_SECRET"]
          url = "https://openapi.koreainvestment.com:9443/oauth2/tokenP"

          start = time.time()
          try:
              res = requests.post(url, json={
                  "grant_type": "client_credentials",
                  "appkey": app_key,
                  "appsecret": app_secret
              }, timeout=10)
              latency = int((time.time() - start) * 1000)
              ok = res.status_code == 200 and "access_token" in res.json()
              result = {
                  "status": "ok" if ok else "fail",
                  "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {
                      "토큰발급": "성공" if ok else "실패",
                      "응답코드": str(res.status_code),
                      "계좌번호확인": "성공" if os.environ.get("KIS_ACCOUNT_NO") else "누락",
                      "응답시간": f"{latency}ms"
                  },
                  "error": None if ok else f"HTTP {res.status_code}: {res.text[:100]}"
              }
              print(f"[{'OK' if ok else 'FAIL'}] KIS API 토큰 발급: {latency}ms")
          except Exception as e:
              result = {
                  "status": "fail", "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {"토큰발급": "실패", "응답코드": "—", "계좌번호확인": "—", "응답시간": "—"},
                  "error": str(e)
              }
              print(f"[FAIL] KIS API: {e}")

          with open("_kis_result.json", "w") as f:
              json.dump(result, f, ensure_ascii=False)
          EOF

      - name: DART API 테스트
        id: test-dart
        run: |
          python - << 'EOF'
          import os, json, requests, time
          from datetime import datetime, timedelta

          api_key = os.environ["DART_API_KEY"]
          url = "https://opendart.fss.or.kr/api/list.json"
          today = datetime.now()
          end_de = today.strftime("%Y%m%d")
          bgn_de = (today - timedelta(days=30)).strftime("%Y%m%d")

          start = time.time()
          try:
              res = requests.get(url, params={
                  "crtfc_key": api_key,
                  "bgn_de": bgn_de,
                  "end_de": end_de,
                  "page_count": 5
              }, timeout=10)
              latency = int((time.time() - start) * 1000)
              data = res.json()
              ok = res.status_code == 200 and data.get("status") == "000"
              count = data.get("total_count", 0) if ok else 0
              result = {
                  "status": "ok" if ok else "fail",
                  "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {
                      "API키확인": "성공",
                      "공시조회테스트": "성공" if ok else "실패",
                      "조회기간": f"{bgn_de}~{end_de}",
                      "기간내공시건수": f"{count}건",
                      "응답시간": f"{latency}ms"
                  },
                  "error": None if ok else f"status: {data.get('status')} message: {data.get('message')}"
              }
              print(f"[{'OK' if ok else 'FAIL'}] DART API: {count}건 {latency}ms")
          except Exception as e:
              result = {
                  "status": "fail", "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {"API키확인": "성공", "공시조회테스트": "실패", "조회기간": f"{bgn_de}~{end_de}", "기간내공시건수": "—", "응답시간": "—"},
                  "error": str(e)
              }
              print(f"[FAIL] DART API: {e}")

          with open("_dart_result.json", "w") as f:
              json.dump(result, f, ensure_ascii=False)
          EOF

      - name: Gemini API 테스트
        id: test-gemini
        run: |
          python - << 'EOF'
          import os, json, time
          from datetime import datetime
          import google.generativeai as genai

          api_key = os.environ["GEMINI_API_KEY"]
          genai.configure(api_key=api_key)

          start = time.time()
          try:
              model = genai.GenerativeModel("gemini-2.5-flash")
              response = model.generate_content("ping")
              latency = int((time.time() - start) * 1000)
              ok = response and len(response.text) > 0
              result = {
                  "status": "ok" if ok else "fail",
                  "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {
                      "모델": "gemini-2.5-flash",
                      "연결상태": "성공" if ok else "실패",
                      "응답테스트": "성공" if ok else "실패",
                      "응답시간": f"{latency}ms"
                  },
                  "error": None
              }
              print(f"[{'OK' if ok else 'FAIL'}] Gemini API: {latency}ms")
          except Exception as e:
              result = {
                  "status": "fail", "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {"모델": "gemini-2.5-flash", "연결상태": "실패", "응답테스트": "실패", "응답시간": "—"},
                  "error": str(e)
              }
              print(f"[FAIL] Gemini API: {e}")

          with open("_gemini_result.json", "w") as f:
              json.dump(result, f, ensure_ascii=False)
          EOF

      - name: DeepSeek API 테스트
        id: test-deepseek
        run: |
          python - << 'EOF'
          import os, json, time
          from datetime import datetime
          from openai import OpenAI

          api_key = os.environ["DEEPSEEK_API_KEY"]
          base_url = os.environ.get("DEEPSEEK_BASE_URL", "https://api.deepseek.com")
          model = os.environ.get("DEEPSEEK_MODEL", "deepseek-chat")

          start = time.time()
          try:
              client = OpenAI(api_key=api_key, base_url=base_url)
              response = client.chat.completions.create(
                  model=model,
                  messages=[{"role": "user", "content": "ping"}],
                  max_tokens=100
              )
              latency = int((time.time() - start) * 1000)
              ok = response and response.choices[0].message.content
              result = {
                  "status": "ok" if ok else "fail",
                  "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {
                      "모델": model,
                      "연결상태": "성공" if ok else "실패",
                      "응답테스트": "성공" if ok else "실패",
                      "응답시간": f"{latency}ms"
                  },
                  "error": None
              }
              print(f"[{'OK' if ok else 'FAIL'}] DeepSeek API: {latency}ms")
          except Exception as e:
              result = {
                  "status": "fail", "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {"API키확인": "성공", "연결시도": "실패"},
                  "error": str(e)
              }
              print(f"[FAIL] DeepSeek API: {e}")

          with open("_deepseek_result.json", "w") as f:
              json.dump(result, f, ensure_ascii=False)
          EOF

      - name: Naver API 테스트
        id: test-naver
        run: |
          python - << 'EOF'
          import os, json, requests, time
          from datetime import datetime

          client_id = os.environ["NAVER_CLIENT_ID"]
          client_secret = os.environ["NAVER_CLIENT_SECRET"]
          url = "https://openapi.naver.com/v1/search/news.json"

          start = time.time()
          try:
              res = requests.get(url,
                  headers={"X-Naver-Client-Id": client_id, "X-Naver-Client-Secret": client_secret},
                  params={"query": "코스닥", "display": 5},
                  timeout=10
              )
              latency = int((time.time() - start) * 1000)
              ok = res.status_code == 200
              count = res.json().get("total", 0) if ok else 0
              result = {
                  "status": "ok" if ok else "fail",
                  "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {
                      "CLIENT_ID확인": "성공",
                      "뉴스검색테스트": "성공" if ok else "실패",
                      "검색결과": f"{count}건",
                      "응답시간": f"{latency}ms"
                  },
                  "error": None if ok else f"HTTP {res.status_code}"
              }
              print(f"[{'OK' if ok else 'FAIL'}] Naver API: {count}건 {latency}ms")
          except Exception as e:
              result = {
                  "status": "fail", "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {"CLIENT_ID확인": "성공", "뉴스검색테스트": "실패", "검색결과": "—", "응답시간": "—"},
                  "error": str(e)
              }
              print(f"[FAIL] Naver API: {e}")

          with open("_naver_result.json", "w") as f:
              json.dump(result, f, ensure_ascii=False)
          EOF

      - name: pykrx 테스트
        id: test-pykrx
        run: |
          python - << 'EOF'
          import json, time
          from datetime import datetime, timedelta

          start = time.time()
          try:
              from pykrx import stock
              today = datetime.now().strftime("%Y%m%d")
              yesterday = (datetime.now() - timedelta(days=1)).strftime("%Y%m%d")
              df = stock.get_market_ohlcv_by_ticker(yesterday)
              latency = int((time.time() - start) * 1000)
              ok = df is not None and len(df) > 0
              result = {
                  "status": "ok" if ok else "fail",
                  "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {
                      "라이브러리로드": "성공",
                      "코스피조회": "성공" if ok else "실패",
                      "코스닥조회": "성공" if ok else "실패",
                      "종목수": f"{len(df)}개" if ok else "—",
                      "응답시간": f"{latency}ms"
                  },
                  "error": None if ok else "데이터 없음"
              }
              print(f"[{'OK' if ok else 'FAIL'}] pykrx: {len(df) if ok else 0}개 {latency}ms")
          except Exception as e:
              result = {
                  "status": "fail", "workflow": "02_test_api.yml",
                  "run_at": datetime.now().strftime("%Y-%m-%dT%H:%M:%S"),
                  "data": {"라이브러리로드": "실패", "코스피조회": "—", "코스닥조회": "—", "응답시간": "—"},
                  "error": str(e)
              }
              print(f"[FAIL] pykrx: {e}")

          with open("_pykrx_result.json", "w") as f:
              json.dump(result, f, ensure_ascii=False)
          EOF

      - name: 임시 결과 통합 (_api_result.json)
        if: always()
        run: |
          python - << 'EOF'
          import json, os

          data = {}
          mapping = {
              "kis":      "_kis_result.json",
              "dart":     "_dart_result.json",
              "gemini":   "_gemini_result.json",
              "deepseek": "_deepseek_result.json",
              "naver":    "_naver_result.json",
              "pykrx":    "_pykrx_result.json",
          }

          for key, fname in mapping.items():
              if os.path.exists(fname):
                  with open(fname, "r", encoding="utf-8") as f:
                      data[key] = json.load(f)
                  os.remove(fname)

          with open("_api_result.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print("_api_result.json 저장 완료")
          EOF

      - name: 임시 결과 업로드 (artifact)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-api-results
          path: _api_result.json
          if-no-files-found: warn
