name: 01 환경변수 체크

on:
  workflow_dispatch:
  push:
    branches: [ dev, main ]

jobs:
  check-env:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Python 설정
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: 환경변수 존재 여부 확인
        id: check
        env:
          DART_API_KEY: ${{ secrets.DART_API_KEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
          DEEPSEEK_BASE_URL: ${{ secrets.DEEPSEEK_BASE_URL }}
          DEEPSEEK_MODEL: ${{ secrets.DEEPSEEK_MODEL }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          KIS_ACCOUNT_NO: ${{ secrets.KIS_ACCOUNT_NO }}
          KIS_APP_KEY: ${{ secrets.KIS_APP_KEY }}
          KIS_APP_SECRET: ${{ secrets.KIS_APP_SECRET }}
          KRX_ID: ${{ secrets.KRX_ID }}
          KRX_PW: ${{ secrets.KRX_PW }}
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          python - << 'EOF'
          import os

          keys = [
              "DART_API_KEY",
              "DEEPSEEK_API_KEY",
              "DEEPSEEK_BASE_URL",
              "DEEPSEEK_MODEL",
              "GEMINI_API_KEY",
              "KIS_ACCOUNT_NO",
              "KIS_APP_KEY",
              "KIS_APP_SECRET",
              "KRX_ID",
              "KRX_PW",
              "NAVER_CLIENT_ID",
              "NAVER_CLIENT_SECRET",
          ]

          results = {}
          all_ok = True

          for key in keys:
              val = os.environ.get(key, "")
              ok = len(val) > 0
              results[key] = "설정됨" if ok else "누락"
              if not ok:
                  all_ok = False
                  print(f"[FAIL] {key} 누락")
              else:
                  print(f"[OK]   {key} 설정됨")

          print(f"\n환경변수 체크 완료: {'전체 통과' if all_ok else '일부 누락'}")
          if not all_ok:
              exit(1)
          EOF
