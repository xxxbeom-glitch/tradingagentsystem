name: 00 results.json 통합 업데이트

on:
  workflow_dispatch:
  workflow_run:
    workflows:
      - "01 환경변수 체크"
      - "02 API 연결 테스트"
      - "03 데이터 수신 테스트"
      - "04 DB 테스트"
    types: [completed]

permissions:
  actions: read
  contents: write

jobs:
  update-results:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: 트리거 워크플로 artifact 다운로드
        if: github.event_name == 'workflow_run'
        uses: dawidd6/action-download-artifact@v9
        with:
          run_id: ${{ github.event.workflow_run.id }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          if_no_artifact_found: ignore

      - name: 02 API 테스트 artifact 다운로드 (수동 실행 시)
        if: github.event_name == 'workflow_dispatch'
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: 02_test_api.yml
          name: test-api-results
          path: .
          github_token: ${{ secrets.GITHUB_TOKEN }}
          if_no_artifact_found: ignore

      - name: 03 데이터 테스트 artifact 다운로드 (수동 실행 시)
        if: github.event_name == 'workflow_dispatch'
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: 03_test_data.yml
          name: test-data-results
          path: .
          github_token: ${{ secrets.GITHUB_TOKEN }}
          if_no_artifact_found: ignore

      - name: 04 DB 테스트 artifact 다운로드 (수동 실행 시)
        if: github.event_name == 'workflow_dispatch'
        uses: dawidd6/action-download-artifact@v9
        with:
          workflow: 04_test_db.yml
          name: test-db-results
          path: .
          github_token: ${{ secrets.GITHUB_TOKEN }}
          if_no_artifact_found: ignore

      - name: results.json 통합
        run: |
          python - << 'EOF'
          import json, os
          from datetime import datetime

          try:
              with open("results.json", "r", encoding="utf-8") as f:
                  data = json.load(f)
          except Exception:
              data = {}

          def find_file(name):
              for root, _, files in os.walk("."):
                  if ".git" in root:
                      continue
                  if name in files:
                      return os.path.join(root, name)
              return None

          for partial_file in ("_api_result.json", "_data_result.json", "_db_result.json"):
              path = find_file(partial_file)
              if path and os.path.exists(path):
                  with open(path, "r", encoding="utf-8") as f:
                      partial = json.load(f)
                  if isinstance(partial, dict):
                      data.update(partial)
                  print(f"병합: {path} ({len(partial)} keys)")

          data["updated_at"] = datetime.now().strftime("%Y-%m-%dT%H:%M:%S")

          with open("results.json", "w", encoding="utf-8") as f:
              json.dump(data, f, ensure_ascii=False, indent=2)

          print("results.json 통합 완료")
          EOF

      - name: results.json 커밋 및 푸시
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git pull --rebase origin main
          git add results.json
          git diff --staged --quiet || git commit -m "ci: results.json 통합 업데이트"
          git push
